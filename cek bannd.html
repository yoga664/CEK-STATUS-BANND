<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Status Nomor</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200') no-repeat center center/cover;
      overflow: hidden; 
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }

    .box {
      position: relative;
      z-index: 2;
      width: 360px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      text-align: center;
      color: white;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      animation: muncul 1s ease;
    }

    @keyframes muncul {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    h2 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    p {
      font-size: 13px;
      color: #ddd;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 16px;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.15);
      color: white;
    }

    input::placeholder {
      color: #ccc;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg,#00b894,#00cec9);
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .loading {
      margin-top: 15px;
      display: none;
      color: #fff;
      font-size: 15px;
    }

    .hasil {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      display: none;
      font-size: 18px;
      font-weight: bold;
      animation: fade 0.5s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .banned {
      background: rgba(231, 76, 60, 0.9);
    }

    .aman {
      background: rgba(39, 174, 96, 0.9);
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="box">
    <h2>📱 CEK STATUS BANND</h2>
               by:yogadev
    <p>Masukkan nomor telepon negara apa saja untuk mengecek status nomor.</p>

    <input type="text" id="nomor" placeholder="Contoh: +628xxxxxxxxxx">

    <button onclick="cekStatus()">CEK SEKARANG</button>

    <div class="loading" id="loading">⏳ Sedang mengecek database...</div>

    <div id="hasil" class="hasil"></div>
  </div>

  <script>

    // DATABASE CONTOH
    // Tambahkan nomor yang ingin dianggap banned
    const nomorBanned = [
      '+6281234567890',
      '+15551234567',
      '+919876543210'
    ];

    function cekStatus() {
      const nomor = document.getElementById('nomor').value.trim();
      const hasil = document.getElementById('hasil');
      const loading = document.getElementById('loading');

      if(nomor === '') {
        alert('Masukkan nomor telepon terlebih dahulu');
        return;
      }

      hasil.style.display = 'none';
      loading.style.display = 'block';

      setTimeout(() => {

        loading.style.display = 'none';
        hasil.style.display = 'block';

        if(nomorBanned.includes(nomor)) {
          hasil.className = 'hasil aman';
          hasil.innerHTML = `✅NOMOR ${nomor} TERBANNED😈😜`;
        } else {
          hasil.className = 'hasil bannd';
          hasil.innerHTML = `❎ NOMOR ${nomor} TIDAK TERBANNED😔`;
        }

      }, 2000);
    }
  </script>

</body>
</html>
